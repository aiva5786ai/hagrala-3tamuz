<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>החלטה טובה • ג' תמוז</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 22px 80px; }
  .head { text-align: center; margin-bottom: 34px; }
  .kicker { font-size: 16px; letter-spacing: 1px; color: var(--gold-light); opacity: .9; margin-bottom: 8px; }
  .title { font-size: clamp(34px, 9vw, 56px); line-height: 1.05; }
  .sub { margin-top: 14px; font-size: 17px; color: var(--text); opacity: .85; }
  .deadline { display:inline-block; margin-top:14px; padding:6px 18px; border:1px solid var(--frame); border-radius:999px; font-size:15px; color:var(--gold-light); }

  .q { font-size: 19px; font-weight: 800; margin: 26px 0 14px; color: var(--gold-light); }
  .choices { display: flex; flex-direction: column; gap: 14px; }
  .choice {
    position: relative;
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px;
    border: 1.5px solid rgba(214,169,84,0.3);
    border-radius: 16px;
    background: rgba(255,216,122,0.04);
    cursor: pointer;
    transition: all .18s ease;
    font-size: 17px; font-weight: 500; line-height: 1.4;
  }
  .choice:hover { border-color: var(--gold); background: rgba(255,216,122,0.08); }
  .choice .dot {
    flex: 0 0 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--gold); display: grid; place-items: center;
  }
  .choice .dot::after { content:""; width: 11px; height: 11px; border-radius: 50%; background: var(--gold); transform: scale(0); transition: transform .18s ease; }
  .choice.sel { border-color: var(--gold); background: rgba(255,216,122,0.12); box-shadow: 0 6px 24px rgba(240,185,74,0.18); }
  .choice.sel .dot::after { transform: scale(1); }

  .fields { margin-top: 26px; display: flex; flex-direction: column; gap: 14px; }
  .field label { display:block; font-size: 15px; margin-bottom: 7px; color: var(--gold-light); }
  .field input {
    width: 100%; padding: 15px 18px; font-size: 17px; font-family: inherit;
    color: var(--text); background: rgba(0,0,0,0.35);
    border: 1.5px solid rgba(214,169,84,0.3); border-radius: 14px; outline: none;
    transition: border-color .15s ease;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: rgba(251,233,200,0.4); }

  .submit-row { margin-top: 30px; text-align: center; }
  .err { color: #ff9a8a; font-size: 14px; margin-top: 12px; min-height: 18px; text-align:center; }
  .prize { margin-top: 30px; text-align: center; font-size: 15px; color: var(--text); opacity:.8; line-height:1.5; }
  .prize b { color: var(--gold-light); }

  /* מסך תודה */
  .thanks { text-align: center; padding: 30px 10px; animation: pop .5s ease; }
  .thanks .vmark { font-size: 64px; margin-bottom: 10px; }
  .thanks h2 { font-size: 34px; margin-bottom: 12px; }
  .thanks p { font-size: 18px; opacity:.85; line-height:1.5; }
  @keyframes pop { from { transform: scale(.85); opacity:0 } to { transform: scale(1); opacity:1 } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="scene"></div><div class="floor"></div><div class="frame"></div>
<div class="bh">ב"ה</div>

<div class="wrap">
  <div class="head">
    <div class="kicker">יומא דהילולא • ג' תמוז</div>
    <h1 class="title gold-text">קבלת החלטה טובה<br>לזכות הרבי זי"ע</h1>
    <p class="sub">בחרו החלטה טובה אחת, ורשמו את שמכם — להצטרפות להגרלה</p>
    <span class="deadline">ההחלטה מתקבלת עד ח"י אלול</span>
  </div>

  <form id="form">
    <div class="q">בחרו את ההחלטה הטובה שלכם:</div>
    <div class="choices" id="choices"></div>

    <div class="fields">
      <div class="field">
        <label for="name">שם מלא</label>
        <input id="name" type="text" placeholder="לדוגמה: משפחת כהן" autocomplete="name" />
      </div>
      <div class="field">
        <label for="phone">מספר טלפון</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="050-0000000" autocomplete="tel" />
      </div>
    </div>

    <div class="submit-row">
      <button type="submit" class="btn-gold" id="submitBtn">קבלת ההחלטה והצטרפות להגרלה</button>
    </div>
    <div class="err" id="err"></div>

    <div class="prize">
      🎁 ההגרלה על <b>שובר ארוחת בוקר זוגית בבית העוגות</b>
    </div>
  </form>

  <div class="thanks hidden" id="thanks">
    <div class="vmark">✨</div>
    <h2 class="gold-text">תודה רבה!</h2>
    <p>ההחלטה הטובה התקבלה והצטרפתם להגרלה.<br>שיהיה בהצלחה ולזכות הרבי! 🙏</p>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
import { SUPABASE_URL, SUPABASE_KEY, TABLE, CHOICES } from "./config.js";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// חלקיקים
const scene = document.body;
for (let i = 0; i < 22; i++) {
  const s = document.createElement("div");
  s.className = "spark";
  const size = 3 + Math.random() * 7;
  s.style.width = s.style.height = size + "px";
  s.style.left = Math.random() * 100 + "vw";
  s.style.bottom = "-10px";
  s.style.animationDuration = (9 + Math.random() * 12) + "s";
  s.style.animationDelay = (-Math.random() * 15) + "s";
  scene.appendChild(s);
}

// בניית כרטיסי הבחירה
let selected = null;
const choicesEl = document.getElementById("choices");
CHOICES.forEach((c, i) => {
  const div = document.createElement("div");
  div.className = "choice";
  div.innerHTML = `<span class="dot"></span><span>${c}</span>`;
  div.onclick = () => {
    document.querySelectorAll(".choice").forEach(e => e.classList.remove("sel"));
    div.classList.add("sel");
    selected = c;
    document.getElementById("err").textContent = "";
  };
  choicesEl.appendChild(div);
});

const form = document.getElementById("form");
const err = document.getElementById("err");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  if (!selected) { err.textContent = "נא לבחור החלטה טובה"; return; }
  if (!name)     { err.textContent = "נא למלא שם"; return; }
  if (phone.replace(/\D/g, "").length < 7) { err.textContent = "נא למלא מספר טלפון תקין"; return; }

  btn.disabled = true; btn.textContent = "שולח...";
  const { error } = await supabase.from(TABLE).insert({ name, phone, choice: selected });
  if (error) {
    err.textContent = "שגיאה בשליחה, נסו שוב"; btn.disabled = false;
    btn.textContent = "קבלת ההחלטה והצטרפות להגרלה";
    return;
  }
  form.classList.add("hidden");
  document.getElementById("thanks").classList.remove("hidden");
});
</script>
</body>
</html>
