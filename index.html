<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>החלטה טובה • ג' תמוז</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 0 60px; }

  /* גרפיקת הרבי בראש העמוד */
  .hero { width: 100%; display: block; border-bottom: 2px solid rgba(214,169,84,.4); }
  .hero-fallback {
    width: 100%; aspect-ratio: 16/9; display: grid; place-items: center; text-align:center;
    background: linear-gradient(160deg, #241608, #120a04);
    border-bottom: 2px solid rgba(214,169,84,.4); color: var(--gold-light); font-size: 15px; padding: 20px;
  }

  .lead { text-align: center; padding: 26px 22px 0; }
  .lead h1 { font-size: clamp(28px, 8vw, 40px); line-height: 1.1; }
  .lead p { margin-top: 12px; font-size: 16px; line-height: 1.55; color: var(--text); opacity: .92; }
  .lead p b { color: var(--gold-light); }

  .inner { padding: 22px 18px 0; }

  /* מלבני ההחלטות — זה לצד זה */
  .choices-row { display: flex; gap: 10px; align-items: stretch; }
  .choice {
    position: relative; flex: 1 1 0; min-width: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 9px; min-height: 132px;
    border: 1.5px solid rgba(214,169,84,0.35); border-radius: 16px;
    background: rgba(255,216,122,0.05); cursor: pointer;
    transition: all .18s ease; text-align: center;
    font-size: 13.5px; font-weight: 600; line-height: 1.32; color: var(--text);
  }
  .choice:hover { border-color: var(--gold); }
  .choice .tick {
    position: absolute; top: 8px; inset-inline-end: 8px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(214,169,84,.6); display: grid; place-items: center;
    font-size: 12px; color: #2a1700; background: transparent; transition: all .18s ease;
  }
  .choice.sel {
    border-color: var(--gold);
    background: linear-gradient(160deg, rgba(255,216,122,.22), rgba(240,185,74,.14));
    box-shadow: 0 6px 22px rgba(240,185,74,0.25); color: #fff4d6;
  }
  .choice.sel .tick { background: var(--gold); border-color: var(--gold); }
  .choice.sel .tick::after { content: "✓"; }

  .fields { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
  .field label { display:block; font-size: 14px; margin-bottom: 6px; color: var(--gold-light); }
  .field input {
    width: 100%; padding: 14px 16px; font-size: 16px; font-family: inherit;
    color: var(--text); background: rgba(0,0,0,0.35);
    border: 1.5px solid rgba(214,169,84,0.3); border-radius: 14px; outline: none;
    transition: border-color .15s ease;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: rgba(251,233,200,0.4); }

  .submit-row { margin-top: 22px; text-align: center; }
  .submit-row .btn-gold { width: 100%; padding: 17px; font-size: 18px; }
  .err { color: #ff9a8a; font-size: 14px; margin-top: 12px; min-height: 18px; text-align:center; }

  .thanks { text-align: center; padding: 40px 20px; animation: pop .5s ease; }
  .thanks .vmark { font-size: 60px; margin-bottom: 10px; }
  .thanks h2 { font-size: 32px; margin-bottom: 12px; }
  .thanks p { font-size: 17px; opacity:.9; line-height:1.5; }
  @keyframes pop { from { transform: scale(.85); opacity:0 } to { transform: scale(1); opacity:1 } }
  .hidden { display: none !important; }

  /* רקע שממשיך את הגרדיאנט של הגרפיקה: חום (כמו תחתית הגרפיקה) → שחור */
  body.form-page .scene {
    background: linear-gradient(180deg, #311d0c 0%, #261405 30%, #160c04 62%, #000000 100%);
  }
  body.form-page .scene::before, body.form-page .scene::after { display: none; }
</style>
</head>
<body class="form-page">
<div class="scene"></div><div class="frame"></div>

<div class="wrap">
  <!-- גרפיקת הרבי. אם אין קובץ — מוצג טקסט חלופי -->
  <img class="hero" src="rabbi-header.jpg" alt="התוועדות ג' תמוז" onerror="this.outerHTML='<div class=\'hero-fallback\'>גרפיקת ג׳ תמוז<br>(יש להוסיף את הקובץ rabbi-header.jpg)</div>'">

  <div class="lead">
    <h1 class="gold-text">בחרי החלטה טובה</h1>
    <p>ובצעי אותה עד <b>ח"י אלול</b>,<br>וכנסי להגרלה על <b>שובר ארוחת בוקר זוגית בבית העוגות</b> 🎁</p>
  </div>

  <div class="inner">
    <form id="form">
      <div class="choices-row" id="choices"></div>

      <div class="fields">
        <div class="field">
          <label for="name">שם מלא</label>
          <input id="name" type="text" placeholder="לדוגמה: משפחת כהן" autocomplete="name" />
        </div>
        <div class="field">
          <label for="phone">מספר טלפון</label>
          <input id="phone" type="tel" inputmode="tel" placeholder="050-0000000" autocomplete="tel" />
        </div>
      </div>

      <div class="submit-row">
        <button type="submit" class="btn-gold" id="submitBtn">שליחה והצטרפות להגרלה</button>
      </div>
      <div class="err" id="err"></div>
    </form>

    <div class="thanks hidden" id="thanks">
      <div class="vmark">✨</div>
      <h2 class="gold-text">תודה רבה!</h2>
      <p>הקבלה הטובה התקבלה והצטרפת להגרלה.<br>שיהיה בהצלחה ולזכות הרבי! 🙏</p>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
import { SUPABASE_URL, SUPABASE_KEY, TABLE, CHOICES } from "./config.js";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// חלקיקים
for (let i = 0; i < 18; i++) {
  const s = document.createElement("div");
  s.className = "spark";
  const size = 3 + Math.random() * 6;
  s.style.width = s.style.height = size + "px";
  s.style.left = Math.random() * 100 + "vw";
  s.style.bottom = "-10px";
  s.style.animationDuration = (9 + Math.random() * 12) + "s";
  s.style.animationDelay = (-Math.random() * 15) + "s";
  document.body.appendChild(s);
}

// בניית מלבני הבחירה (רב-בחירה)
const selected = new Set();
const choicesEl = document.getElementById("choices");
CHOICES.forEach((c) => {
  const div = document.createElement("div");
  div.className = "choice";
  div.innerHTML = `<span class="tick"></span><span>${c}</span>`;
  div.onclick = () => {
    if (selected.has(c)) { selected.delete(c); div.classList.remove("sel"); }
    else { selected.add(c); div.classList.add("sel"); }
    document.getElementById("err").textContent = "";
  };
  choicesEl.appendChild(div);
});

const form = document.getElementById("form");
const err = document.getElementById("err");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  if (selected.size === 0) { err.textContent = "נא לבחור לפחות החלטה אחת"; return; }
  if (!name)     { err.textContent = "נא למלא שם"; return; }
  if (phone.replace(/\D/g, "").length < 7) { err.textContent = "נא למלא מספר טלפון תקין"; return; }

  btn.disabled = true; btn.textContent = "שולח...";
  const choiceText = [...selected].join(" | ");
  const { error } = await supabase.from(TABLE).insert({ name, phone, choice: choiceText });
  if (error) {
    err.textContent = "שגיאה בשליחה, נסו שוב"; btn.disabled = false;
    btn.textContent = "שליחה והצטרפות להגרלה";
    return;
  }
  form.classList.add("hidden");
  document.getElementById("thanks").classList.remove("hidden");
});
</script>
</body>
</html>
