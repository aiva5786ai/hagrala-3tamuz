<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>הגרלה • כרטיסים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  /* רקע מוזהב מוחשך */
  body.screen .scene {
    background:
      linear-gradient(rgba(6,4,2,0.30), rgba(6,4,2,0.48)),
      url('bg-stage.jpg') center center / cover no-repeat;
  }
  body.screen .scene::before, body.screen .scene::after { display: none; }
  body.screen .floor { display: none; }

  /* ===== מסך הזנת השמות ===== */
  .setup { max-width: 560px; margin: 0 auto; padding: 7vh 22px 60px; text-align: center; }
  .setup .kicker { font-size: 16px; color: var(--gold-light); letter-spacing: 1px; opacity:.9; }
  .setup h1 { font-size: clamp(36px, 11vw, 60px); line-height: 1.05; margin: 6px 0 10px; }
  .setup p.sub { font-size: 16px; opacity: .85; margin-bottom: 22px; line-height: 1.5; }
  .setup label { display:block; text-align: right; font-size: 14px; color: var(--gold-light); margin: 14px 0 7px; }
  .setup textarea {
    width: 100%; min-height: 230px; resize: vertical; padding: 16px 18px;
    font-family: inherit; font-size: 17px; line-height: 1.6; color: var(--text);
    background: rgba(0,0,0,0.4); border: 1.5px solid rgba(214,169,84,.35);
    border-radius: 16px; outline: none;
  }
  .setup textarea:focus { border-color: var(--gold); }
  .setup textarea::placeholder { color: rgba(251,233,200,0.4); }
  .setup input.title {
    width: 100%; padding: 14px 16px; font-family: inherit; font-size: 16px; color: var(--text);
    background: rgba(0,0,0,0.4); border: 1.5px solid rgba(214,169,84,.35); border-radius: 14px; outline: none;
  }
  .setup input.title:focus { border-color: var(--gold); }
  .setup input.title::placeholder { color: rgba(251,233,200,0.4); }
  .setup .go { margin-top: 22px; width: 100%; padding: 17px; font-size: 19px; }
  .setup .hint { margin-top: 12px; font-size: 14px; opacity: .7; }
  .setup .err { color:#ff9a8a; min-height: 18px; margin-top: 8px; }

  /* ===== מסך ההגרלה ===== */
  .raffleView { position: fixed; inset: 0; display: none; }
  .raffleView.show { display: block; }
  .rv-head { position: relative; text-align: center; padding-top: 34px; padding-inline: 16px; }
  .rv-head h2 { font-size: clamp(28px, 6vw, 52px); line-height: 1.05; }
  .rv-head .banner { margin-top: 10px; font-size: 17px; color: var(--gold-light); opacity:.92; }

  .pile { position: absolute; inset: 0; pointer-events: none; }
  .ticket {
    position: absolute; width: 116px; height: 78px; border-radius: 12px;
    background: linear-gradient(135deg, #fff6df 0%, #ffe5a3 45%, #f0b94a 100%);
    box-shadow: 0 8px 22px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.35);
    transition: transform 1s cubic-bezier(.2,.7,.2,1), opacity .5s ease;
    display: grid; place-items: center;
  }
  .ticket::before { content:""; position:absolute; top:0; bottom:0; right:50%; width:1px;
    background: repeating-linear-gradient(transparent, transparent 4px, rgba(184,128,31,.5) 4px, rgba(184,128,31,.5) 8px); }
  .ticket .seal { width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle, #b8801f, #7a5210);
    box-shadow: inset 0 1px 2px rgba(255,255,255,.4); display:grid; place-items:center; color:#ffe6a8; font-size:15px; }

  .winner {
    position: absolute; top: 50%; left: 50%; width: min(560px, 86vw); padding: 40px 30px;
    transform: translate(-50%, -50%) scale(.6); opacity: 0; border-radius: 24px; text-align: center;
    background: linear-gradient(160deg, #fff7e0, #ffd87a 55%, #e6a93a);
    box-shadow: 0 30px 90px rgba(240,185,74,.5), 0 0 0 3px rgba(255,255,255,.4);
    transition: transform .7s cubic-bezier(.2,1.3,.4,1), opacity .5s ease; pointer-events: none;
  }
  .winner.reveal { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  .winner .lbl { font-size: 20px; font-weight:800; color:#7a5210; letter-spacing: 2px; }
  .winner .wname { font-size: clamp(38px, 7vw, 64px); font-weight: 900; color:#3a2400; margin: 10px 0 0; line-height:1.05; }

  .controls {
    position: absolute; bottom: 40px; left: 0; right: 0; display: flex; gap: 14px;
    justify-content: center; flex-wrap: wrap; z-index: 60; padding: 0 14px;
  }
  .btn-ghost {
    font-family: inherit; cursor:pointer; border:1.5px solid var(--gold); background: rgba(0,0,0,.35);
    color: var(--gold-light); border-radius: 999px; padding: 14px 28px; font-size: 16px; font-weight: 700;
    transition: all .15s ease;
  }
  .btn-ghost:hover { background: rgba(240,185,74,.15); }

  .confetti { position: fixed; top: -10px; width: 10px; height: 14px; z-index: 70; opacity:0; }
  @keyframes fall { 0%{ transform: translateY(-10vh) rotate(0); opacity:1 } 100%{ transform: translateY(110vh) rotate(720deg); opacity:0 } }
  .hidden { display:none !important; }
</style>
</head>
<body class="screen">
<div class="scene"></div><div class="floor"></div>
<div class="bh">ב"ה</div>

<!-- מסך הזנת שמות -->
<div class="setup" id="setup">
  <h1 class="gold-text">הגרלת כרטיסים</h1>
  <p class="sub">הדביקו רשימת שמות — שם בכל שורה (או מופרדים בפסיקים),<br>ולחצו להתחלת ההגרלה. הכל נשאר אצלכם בלבד.</p>

  <label for="namesBox">רשימת השמות</label>
  <textarea id="namesBox" placeholder="לדוגמה:&#10;משפחת כהן&#10;משפחת לוי&#10;שרה אזימוב&#10;..."></textarea>

  <label for="titleBox">כותרת / פרס ההגרלה (לא חובה)</label>
  <input class="title" id="titleBox" type="text" placeholder="לדוגמה: ההגרלה על שובר ארוחת בוקר זוגית" />

  <button class="btn-gold go" id="startBtn">🎟️ התחלת ההגרלה</button>
  <div class="err" id="err"></div>
  <div class="hint" id="hint"></div>
</div>

<!-- מסך ההגרלה -->
<div class="raffleView" id="raffleView">
  <div class="rv-head">
    <h2 class="gold-text" id="rvTitle">מערבבים את הפתקים…</h2>
    <div class="banner" id="rvBanner"></div>
  </div>
  <div class="pile" id="pile"></div>
  <div class="winner" id="winner">
    <div class="lbl">🎉 הזוכה בהגרלה 🎉</div>
    <div class="wname" id="wname"></div>
  </div>
  <div class="controls">
    <button class="btn-gold" id="drawBtn">שליפת פתק</button>
    <button class="btn-ghost" id="againBtn">ערבוב והגרלה מחדש</button>
    <button class="btn-ghost" id="backBtn">עריכת הרשימה</button>
  </div>
</div>

<script>
// ----- חלקיקי רקע -----
for (let i = 0; i < 24; i++) {
  const s = document.createElement("div");
  s.className = "spark";
  const size = 3 + Math.random() * 7;
  s.style.width = s.style.height = size + "px";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (9 + Math.random() * 13) + "s";
  s.style.animationDelay = (-Math.random() * 18) + "s";
  document.body.appendChild(s);
}

const $ = (id) => document.getElementById(id);
let names = [];
let tickets = [];
let shuffleTimer = null;

function parseNames(text) {
  return text.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
}

$("namesBox").addEventListener("input", () => {
  const n = parseNames($("namesBox").value).length;
  $("hint").textContent = n ? `${n} שמות ברשימה` : "";
  $("err").textContent = "";
});

$("startBtn").onclick = () => {
  names = parseNames($("namesBox").value);
  if (names.length < 2) { $("err").textContent = "נא להזין לפחות שני שמות"; return; }
  const title = $("titleBox").value.trim();
  $("rvBanner").textContent = title ? ("🎁 " + title) : "";
  $("setup").classList.add("hidden");
  $("raffleView").classList.add("show");
  openRaffle();
};

function buildTickets() {
  const pile = $("pile");
  pile.innerHTML = "";
  tickets = [];
  $("winner").classList.remove("reveal");
  const W = window.innerWidth, H = window.innerHeight;
  names.forEach((nm, i) => {
    const t = document.createElement("div");
    t.className = "ticket";
    t.innerHTML = `<div class="seal">★</div>`;
    t.dataset.idx = i;
    t.style.left = (W/2 - 58) + "px";
    t.style.top  = (H/2 - 39) + "px";
    t.style.transform = "scale(0)";
    pile.appendChild(t);
    tickets.push(t);
  });
  requestAnimationFrame(scatter);
}

function scatter() {
  const W = window.innerWidth, H = window.innerHeight;
  const padX = Math.min(110, W*0.12), topY = 150, botY = H - 150;
  tickets.forEach((t) => {
    const x = padX + Math.random() * Math.max(40, (W - padX*2 - 116));
    const y = topY + Math.random() * Math.max(40, (botY - topY));
    const r = (Math.random() * 60 - 30);
    t.style.left = x + "px";
    t.style.top = y + "px";
    t.style.transform = `rotate(${r}deg) scale(1)`;
  });
}

function startShuffle() {
  $("rvTitle").textContent = "מערבבים את הפתקים…";
  $("drawBtn").disabled = false;          // אפשר לשלוף בכל רגע
  clearInterval(shuffleTimer);
  shuffleTimer = setInterval(scatter, 700); // ממשיך להתערבב עד השליפה
}

function openRaffle() {
  $("winner").classList.remove("reveal");
  $("drawBtn").classList.remove("hidden");
  $("againBtn").classList.add("hidden");
  buildTickets();
  startShuffle();
}

function draw() {
  if (tickets.length === 0) return;
  clearInterval(shuffleTimer);            // עצירת הערבוב ברגע השליפה
  $("drawBtn").disabled = true;
  $("rvTitle").textContent = "שולפים פתק…";
  const W = window.innerWidth, H = window.innerHeight;
  const winIdx = Math.floor(Math.random() * tickets.length);
  tickets.forEach((t, i) => {
    if (i === winIdx) {
      t.style.left = (W/2 - 58) + "px";
      t.style.top  = (H/2 - 39) + "px";
      t.style.transform = "rotate(0deg) scale(1.15)";
      t.style.zIndex = 65;
    } else {
      t.style.opacity = "0.12";
      t.style.transform += " scale(.7)";
    }
  });
  const name = names[Number(tickets[winIdx].dataset.idx)];
  setTimeout(() => {
    tickets[winIdx].style.opacity = "0";
    $("wname").textContent = name;
    $("rvTitle").textContent = "🎉 מזל טוב! 🎉";
    $("winner").classList.add("reveal");
    burstConfetti();
    $("againBtn").classList.remove("hidden");
  }, 1100);
}

function burstConfetti() {
  const colors = ["#ffd87a", "#f0b94a", "#fff4d6", "#b8801f"];
  for (let i = 0; i < 90; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[i % colors.length];
    c.style.animation = `fall ${2 + Math.random()*2.5}s linear ${Math.random()*0.6}s forwards`;
    c.style.borderRadius = Math.random() > .5 ? "2px" : "50%";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

$("drawBtn").onclick = draw;
$("againBtn").onclick = openRaffle;
$("backBtn").onclick = () => {
  clearInterval(shuffleTimer);
  $("raffleView").classList.remove("show");
  $("setup").classList.remove("hidden");
};
</script>
</body>
</html>
